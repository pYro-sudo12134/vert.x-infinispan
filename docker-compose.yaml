version: '3.8'

services:
  nfs-server:
    image: itsthenetwork/nfs-server-alpine:latest
    container_name: nfs-server
    privileged: true
    environment:
      - SHARED_DIRECTORY=/nfs
    volumes:
      - nfs-storage:/nfs
    ports:
      - "2049:2049"
    networks:
      - vertx-net

  vertx-node-1:
    image: pyrodocker1/kinda-nfs:1.0
    container_name: vertx-node-1
    ports:
      - "8081:8080"
      - "8082:8079"
    environment:
      - HTTP_SERVER_PORT=8080
      - NFS_MOUNT_PATH=/mnt/nfs
      - NODE_ID=node-1
      - CLUSTERED=true
      - CLUSTER_NAME=vertx-cluster
      - CLUSTER_HOST=vertx-node-1
      - CLUSTER_PORT=7800
      - JGROUPS_BIND_ADDR=vertx-node-1
      - JGROUPS_EXTERNAL_ADDR=localhost
      - JGROUPS_EXTERNAL_PORT=7800
    volumes:
      - nfs-storage:/mnt/nfs
      - temp-uploads:/tmp/file-uploads
      - infinispan-indexes-1:/tmp/infinispan-indexes
    restart: on-failure
    networks:
      - vertx-net
    depends_on:
      - nfs-server

  vertx-node-2:
    image: pyrodocker1/kinda-nfs:1.0
    container_name: vertx-node-2
    ports:
      - "8083:8080"
      - "8084:8079"
    environment:
      - HTTP_SERVER_PORT=8080
      - NFS_MOUNT_PATH=/mnt/nfs
      - NODE_ID=node-2
      - CLUSTERED=true
      - CLUSTER_NAME=vertx-cluster
      - CLUSTER_HOST=vertx-node-2
      - CLUSTER_PORT=7800
      - JGROUPS_BIND_ADDR=vertx-node-2
      - JGROUPS_EXTERNAL_ADDR=localhost
      - JGROUPS_EXTERNAL_PORT=7800
    volumes:
      - nfs-storage:/mnt/nfs
      - temp-uploads:/tmp/file-uploads
      - infinispan-indexes-2:/tmp/infinispan-indexes
    restart: on-failure
    networks:
      - vertx-net
    depends_on:
      - nfs-server
      - vertx-node-1

  vertx-node-3:
    image: pyrodocker1/kinda-nfs:1.0
    container_name: vertx-node-3
    ports:
      - "8085:8080"
      - "8086:8079"
    environment:
      - HTTP_SERVER_PORT=8080
      - NFS_MOUNT_PATH=/mnt/nfs
      - NODE_ID=node-3
      - CLUSTERED=true
      - CLUSTER_NAME=vertx-cluster
      - CLUSTER_HOST=vertx-node-3
      - CLUSTER_PORT=7800
      - JGROUPS_BIND_ADDR=vertx-node-3
      - JGROUPS_EXTERNAL_ADDR=localhost
      - JGROUPS_EXTERNAL_PORT=7800
    volumes:
      - nfs-storage:/mnt/nfs
      - temp-uploads:/tmp/file-uploads
      - infinispan-indexes-3:/tmp/infinispan-indexes
    restart: on-failure
    networks:
      - vertx-net
    depends_on:
      - nfs-server
      - vertx-node-2

volumes:
  nfs-storage:
    driver: local
  temp-uploads:
  infinispan-indexes-1:
  infinispan-indexes-2:
  infinispan-indexes-3:

networks:
  vertx-net:
    driver: bridge